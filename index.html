<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculadora</title>
		<link rel="stylesheet" href="style.css" />
	</head>

	<body>
		<h1>Calculadora</h1>
		<div class="calculadora">
			<input type="text" id="pantalla" readonly placeholder="0" />
			<div class="botones">
				<button onclick="agregarALaPantalla('1')">1</button>
				<button onclick="agregarALaPantalla('2')">2</button>
				<button onclick="agregarALaPantalla('3')">3</button>
				<button class="operador" onclick="agregarALaPantalla('+')">+</button>

				<button onclick="agregarALaPantalla('4')">4</button>
				<button onclick="agregarALaPantalla('5')">5</button>
				<button onclick="agregarALaPantalla('6')">6</button>
				<button class="operador" onclick="agregarALaPantalla('-')">−</button>

				<button onclick="agregarALaPantalla('7')">7</button>
				<button onclick="agregarALaPantalla('8')">8</button>
				<button onclick="agregarALaPantalla('9')">9</button>
				<button class="operador" onclick="agregarALaPantalla('*')">×</button>

				<button onclick="agregarALaPantalla('0')">0</button>
				<button onclick="agregarALaPantalla('.')">.</button>
				<button class="operador" onclick="agregarALaPantalla('/')">÷</button>
				<button class="igual" onclick="calcular()">=</button>

				<button class="limpiar" onclick="limpiarPantalla()">AC</button>
				<button class="borrar" onclick="borrarUltimo()">⌫</button>
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
